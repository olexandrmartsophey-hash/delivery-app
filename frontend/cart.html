<!DOCTYPE html>
<html>
<head>
  <title>Shopping Cart</title>
  <link rel="stylesheet" href="./style.css">
</head>
<body>
  <div style="display: flex; gap: 40px; padding: 20px;">
    <div style="flex: 1; display: flex; flex-direction: column; gap: 10px;">
      <input id="email" placeholder="Email">
      <input id="phone" placeholder="Phone">
      <input id="address" placeholder="Address">
      <input id="coupon" placeholder="Coupon Code (Optional)">
      <button id="submit" style="margin-top: 20px; padding: 10px; background: green; color: white; border: none; cursor: pointer;">Submit Order</button>
    </div>

    <div style="flex: 2;">
      <h2>Your Items</h2>
      <div id="cart-items" style="display: flex; flex-direction: column; gap: 10px;">
        </div>
      <h3 id="total-price" style="margin-top: 20px;">Total: $0</h3>
    </div>
  </div>

  <script type="module" src="./js/cart.js"></script>
</body>
</html>
