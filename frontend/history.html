<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Delivery App - Order History</title>
  <link rel="stylesheet" href="./style.css">
</head>
<body>

  <header class="main-header">
    <nav class="navbar">
      <div class="nav-logo">FastFood Delivery</div>
      <ul class="nav-links">
        <li><a href="index.html">Shop</a></li>
        <li><a href="cart.html">Shopping Cart</a></li>
        <li><a href="history.html" class="active">History</a></li>
        <li><a href="coupons.html">Coupons</a></li>
      </ul>
    </nav>
  </header>

  <main class="container">
    <h1>Find Your Orders</h1>
    <p>Enter your details to see your order history and reorder your favorite meals.</p>

    <div class="controls">
      <div class="filter-group">
        <label for="email">Email:</label>
        <input type="email" id="email" placeholder="example@mail.com" required>
      </div>

      <div class="filter-group">
        <label for="phone">Phone:</label>
        <input type="tel" id="phone" placeholder="+380..." required>
      </div>

      <div class="filter-group" style="justify-content: flex-end;">
        <button id="find" style="padding: 10px 20px; background: #e67e22; color: white; border: none; border-radius: 4px; cursor: pointer;">
          Find Orders
        </button>
      </div>
    </div>

    <div id="orders" class="product-grid">
      </div>
  </main>

  <script type="module" src="./js/history.js"></script>
</body>
</html>
